name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag / version to release (e.g. v2.1.0)'
        required: true

permissions:
  contents: write   # needed to create a release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npm run package

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Beads Kanban ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.file }}
